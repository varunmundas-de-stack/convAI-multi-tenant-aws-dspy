# Cube.js model — fact_secondary_sales (shared across all CPG tenants via schema filter)
# Multi-tenancy enforced via RLS filters injected by the backend (soCode / asmCode etc.)

cubes:
  - name: FactSecondarySales
    sql_table: fact_secondary_sales

    measures:
      - name: totalNetValue
        sql: net_value
        type: sum
        title: "Total Net Sales Value (₹)"
        format: currency

      - name: totalQuantity
        sql: invoice_quantity
        type: sum
        title: "Total Volume (Units)"

      - name: grossSalesValue
        sql: gross_value
        type: sum
        title: "Gross Sales Value (₹)"
        format: currency

      - name: totalDiscount
        sql: discount_amount
        type: sum
        title: "Total Discount (₹)"
        format: currency

      - name: totalMargin
        sql: margin_amount
        type: sum
        title: "Total Margin (₹)"
        format: currency

      - name: invoiceCount
        sql: invoice_number
        type: count_distinct
        title: "Invoice Count"

      - name: avgSellingPrice
        sql: "CASE WHEN SUM(invoice_quantity) > 0 THEN SUM(net_value) / SUM(invoice_quantity) ELSE 0 END"
        type: number
        title: "Avg Selling Price (₹)"
        format: currency

      - name: returnValue
        sql: return_value
        type: sum
        title: "Return Value (₹)"
        format: currency

      - name: activeOutlets
        sql: customer_key
        type: count_distinct
        title: "Active Outlets"

    dimensions:
      - name: invoiceNumber
        sql: invoice_number
        type: string
        primary_key: true

      - name: invoiceDate
        sql: invoice_date
        type: time
        title: "Invoice Date"

      - name: soCode
        sql: so_code
        type: string
        title: "SO Code"

      - name: asmCode
        sql: asm_code
        type: string
        title: "ASM Code"

      - name: zsmCode
        sql: zsm_code
        type: string
        title: "ZSM Code"

      - name: nsmCode
        sql: nsm_code
        type: string
        title: "NSM Code"

    joins:
      - name: DimProduct
        sql: "{FactSecondarySales}.product_key = {DimProduct}.product_key"
        relationship: many_to_one

      - name: DimGeography
        sql: "{FactSecondarySales}.geography_key = {DimGeography}.geography_key"
        relationship: many_to_one

      - name: DimCustomer
        sql: "{FactSecondarySales}.customer_key = {DimCustomer}.customer_key"
        relationship: many_to_one

      - name: DimChannel
        sql: "{FactSecondarySales}.channel_key = {DimChannel}.channel_key"
        relationship: many_to_one

      - name: DimSalesHierarchy
        sql: "{FactSecondarySales}.sales_hierarchy_key = {DimSalesHierarchy}.hierarchy_key"
        relationship: many_to_one

      - name: DimDate
        sql: "{FactSecondarySales}.date_key = {DimDate}.date_key"
        relationship: many_to_one
