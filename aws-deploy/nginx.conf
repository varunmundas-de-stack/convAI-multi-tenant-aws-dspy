upstream fastapi_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ── SSE streaming — disable all buffering ─────────────────────────────────
    location /query/stream {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API routes ────────────────────────────────────────────────────────────
    location ~ ^/(auth|query|insights|dashboard|admin|rlhf|health) {
        proxy_pass http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Static assets (React build) — aggressive caching ─────────────────────
    location /assets/ {
        proxy_pass http://fastapi_app;
        expires 30d;
        add_header Cache-Control "public, immutable";
        proxy_set_header Host $host;
    }

    # ── React SPA — serve index.html for all non-API routes ──────────────────
    location / {
        proxy_pass http://fastapi_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml application/xml;
    gzip_min_length 1024;
}
